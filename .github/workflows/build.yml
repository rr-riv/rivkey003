name: Build ZMK Firmware
on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZMK
        uses: zmkfirmware/zmk/.github/actions/build-zmk@main
        with:
          board: "rivkey"      # ← ここをAuto-KDK出力のボード名に変更（例: nice_nano_v2 など）
          shield: "rivkey"    # ← ここをAuto-KDKで生成されたシールド名に変更j
