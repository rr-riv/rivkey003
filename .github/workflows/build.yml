name: Build ZMK Firmware
on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user config
        uses: actions/checkout@v4

      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          ref: main
          path: zmk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install west
        run: pip install west

      - name: West Init & Update
        run: |
          cd zmk
          west init -l app
          west update

      - name: Install Zephyr SDK (manual)
        run: |
          mkdir -p $HOME/zephyr-sdk
          cd $HOME/zephyr-sdk
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.8/zephyr-sdk-0.16.8_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.16.8_linux-x86_64.tar.xz
          ./zephyr-sdk-0.16.8/setup.sh -t all -h -c

      - name: Build
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=$HOME/zephyr-sdk/zephyr-sdk-0.16.8
          cd zmk/app
          west build -b xiao_ble -- -DZMK_CONFIG=${{ github.workspace }}/config

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: zmk/app/build/zephyr/zmk.uf2
