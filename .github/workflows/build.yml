name: Build ZMK Firmware
on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZMK
        uses: zmkfirmware/zmk/.github/actions/build-zmk@main
        with:
          board: "riv2"           # ← riv2 の場合このまま試す
          shield: "riv2"          # ← riv2 の場合このまま試す（必要に応じて変更）
