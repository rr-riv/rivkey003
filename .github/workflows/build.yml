name: Build ZMK Firmware
on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user config
        uses: actions/checkout@v4

      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          ref: main
          path: zmk

      - name: Initialize west
        run: |
          cd zmk
          west init -l app
          west update

      - name: Build
        run: |
          cd zmk/app
          west build -b seeed_xiao_nrf52840 -- -DSHIELD=des -DZMK_CONFIG=${{ github.workspace }}/config

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: zmk/app/build/zephyr/zmk.uf2
